<!DOCTYPE html>
<html>

        .footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 0; background: #050505; display: flex; justify-content: center; gap: 20px; border-top: 2px solid #333; }
        .footer a { color: #ff0000; text-decoration: none; font-weight: bold; font-size: 14px; }

</head>
